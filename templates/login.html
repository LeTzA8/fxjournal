{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
    <div class="login-card">
        <p class="eyebrow">FX Journal</p>
        <h1>Welcome back</h1>
        <p class="subtext">Sign in to continue tracking your trading journal.</p>
        {% if success %}
        <p class="notice success">{{ success }}</p>
        {% endif %}
        {% if error %}
        <p class="notice error">{{ error }}</p>
        {% endif %}

        <form action="/login" method="post" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" required>

            <button type="submit">Log In</button>
        </form>
        <p class="switch-link"><a href="/password/forgot">Forgot password?</a></p>
        <p class="switch-link">No account yet? <a href="/register">Create one</a></p>
    </div>
</section>

<style>
    .auth-shell { position: relative;
        min-height: 100vh;
        width: 100%;
        display: grid;
        place-items: center;
        overflow: hidden;
        isolation: isolate;
        padding: clamp(1rem, 3vw, 2rem);
        perspective: 1100px; }
.login-card { width: min(100%, 470px); border: 1px solid #cfd9d1;
        border-radius: 16px;
        padding: clamp(1.4rem, 2.4vw, 2rem);
        box-shadow: 0 16px 40px rgba(20, 83, 45, 0.14);
        backdrop-filter: blur(3px);
        animation: card-in 700ms cubic-bezier(.2, .8, .2, 1); }

    .eyebrow { margin: 0;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase; font-weight: 700; }

    .login-card h1 { margin: 0.35rem 0 0; font-size: clamp(1.55rem, 2.8vw, 2.2rem); }

    .subtext { margin-top: 0.55rem; }

    .notice { margin: 0.9rem 0 0;
        padding: 0.6rem 0.75rem;
        border-radius: 8px;
        font-size: 0.92rem;
        line-height: 1.4; }

    .notice.success { border: 1px solid #9fcead; }

    .notice.error { border: 1px solid #e1b0ad; }

    .switch-link { margin: 0.9rem 0 0;
        text-align: center; font-size: 0.95rem; }

    .switch-link a { font-weight: 700;
        text-decoration: none; }

    .switch-link a:hover { text-decoration: underline; }

    .login-form { margin-top: 1.2rem;
        display: grid;
        gap: 0.8rem; }

    .login-form label { font-size: 0.9rem; font-weight: 600; }

    .login-form input { width: 100%;
        padding: 0.78rem 0.9rem;
        border-radius: 10px;
        border: 1px solid #b7c6bb;  font: inherit;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease; }

    .login-form input:hover { border-color: #93ae9f; }

    .login-form input:focus { outline: none;
        border-color: #1f6f46;
        box-shadow: 0 0 0 4px rgba(31, 111, 70, 0.16);
        transform: translateY(-1px); }

    .login-form button { margin-top: 0.5rem;
        padding: 0.85rem 1rem;
        border: none;
        border-radius: 10px;  font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease; }

    .login-form button:hover { transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(20, 83, 45, 0.26);
        filter: brightness(1.03); }

    .login-form button:active { transform: translateY(0); }

    .login-form button:focus-visible { outline: 3px solid #9ad4b1;
        outline-offset: 2px; }

    @keyframes card-in { from { opacity: 0;
            transform: translateY(16px) scale(0.985); }
        to { opacity: 1;
            transform: translateY(0) scale(1); } }

    @media (max-width: 540px) { .auth-shell { min-height: 100vh; }

        .login-card { border-radius: 14px; } }

    @media (prefers-reduced-motion: reduce) { .login-card,
        .login-form input,
        .login-form button { animation: none !important;
            transition: none !important; } }
</style>
{% endblock %}
