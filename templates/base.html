<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "FX Journal" }}</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='tab-logo.png', v='1') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='tab-logo.png', v='1') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='tab-logo.png', v='1') }}">
    <script>
        (() => {
            const storageKey = "fxj-theme";
            const forcedTheme = "dark";
            try {
                document.documentElement.setAttribute("data-theme", forcedTheme);
                localStorage.setItem(storageKey, forcedTheme);
            } catch (_error) {
                document.documentElement.setAttribute("data-theme", forcedTheme);
            }
            document.documentElement.classList.add("js-reveal-pending");
        })();
    </script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap");
        :root {
            color-scheme: light;
            --bg: #f8fafc;
            --bg-spot: #e8edff;
            --card: #ffffff;
            --surface: #f8fafc;
            --border: #e5e7eb;
            --ink: #111827;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --muted: #6b7280;
            --good: #16a34a;
            --bad: #dc2626;
            --neon-ribbon-opacity: 0.9;
            --curve-draw-ease: cubic-bezier(.22, .61, .36, 1);
            --font-ui: "Manrope", "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            --font-display: "Sora", "Manrope", "Segoe UI", sans-serif;
            --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0b0f14;
            --bg-spot: #111827;
            --card: #111827;
            --surface: #0f1722;
            --border: #1f2937;
            --ink: #f8fafc;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --muted: #94a3b8;
            --good: #22c55e;
            --bad: #ef4444;
            --neon-ribbon-opacity: 0.99;
            --curve-draw-ease: cubic-bezier(.22, .61, .36, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: var(--font-ui);
            color: var(--ink);
            background: transparent;
            min-height: 100vh;
            position: relative;
            isolation: isolate;
        }

        .neon-ribbon-canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            opacity: 0;
            filter: saturate(1.05) contrast(1.02);
            transition: opacity 260ms ease;
        }

        body.neon-ribbon-ready .neon-ribbon-canvas {
            opacity: var(--neon-ribbon-opacity);
        }

        .dash-content,
        .analytics-content {
            animation: none;
        }

        .auth-shell,
        .dash-content.no-reveal-enter,
        .analytics-content.no-reveal-enter {
            animation: page-enter 920ms cubic-bezier(.22, .61, .36, 1) both;
        }

        .reveal-item {
            opacity: 0;
            transform: translateY(24px) scale(0.988);
            filter: blur(8px);
            transition:
                opacity 700ms cubic-bezier(.22, .61, .36, 1),
                transform 700ms cubic-bezier(.22, .61, .36, 1),
                filter 520ms cubic-bezier(.22, .61, .36, 1);
            transition-delay: var(--reveal-delay, 0ms);
            will-change: opacity, transform;
        }

        .reveal-item.reveal-row {
            transform: translateY(18px) scale(0.99);
        }

        .reveal-item.is-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }

        .js-reveal-pending .metric,
        .js-reveal-pending .panel,
        .js-reveal-pending .login-card,
        .js-reveal-pending .card,
        .js-reveal-pending .landing-reveal,
        .js-reveal-pending [data-reveal] {
            opacity: 0;
            transform: translateY(24px) scale(0.988);
            filter: blur(8px);
        }

        .metric.is-visible,
        .panel.is-visible {
            animation: panel-breathe 14s ease-in-out 1.1s infinite;
        }
@keyframes page-enter {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes panel-enter {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes panel-breathe {
            0%, 100% {
                box-shadow: 0 10px 28px rgba(2, 6, 23, 0.14);
                border-color: var(--border);
            }
            50% {
                box-shadow: 0 16px 34px rgba(2, 6, 23, 0.2);
                border-color: color-mix(in srgb, var(--border) 86%, var(--accent) 14%);
            }
        }

        @keyframes row-enter {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-display);
            letter-spacing: -0.015em;
        }

        main {
            max-width: 760px;
            margin: 4rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 1;
        }

        body.auth-layout main {
            max-width: none;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .auth-topbar {
            position: absolute;
            top: clamp(0.8rem, 2vw, 1.15rem);
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            width: min(980px, calc(100% - 1.5rem));
            min-height: 56px;
            padding: 0.42rem 0.7rem;
            border: 1px solid color-mix(in srgb, var(--border) 58%, transparent);
            border-radius: 14px;
            background: color-mix(in srgb, var(--card) 32%, transparent);
            backdrop-filter: blur(8px) saturate(1.05);
            -webkit-backdrop-filter: blur(8px) saturate(1.05);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.7rem;
        }

        .auth-topbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.52rem;
            text-decoration: none;
            color: var(--ink) !important;
            font-family: var(--font-display);
            font-size: 0.98rem;
            font-weight: 800;
            letter-spacing: 0.01em;
            min-width: 0;
        }

        .auth-topbar-brand span {
            color: var(--ink) !important;
        }

        .auth-topbar-logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--border) 74%, transparent);
            object-fit: cover;
            background: color-mix(in srgb, var(--surface) 84%, transparent);
            flex: 0 0 auto;
        }

        .auth-topbar-links {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.42rem;
            flex-wrap: wrap;
        }

        .auth-topbar-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 0.8rem;
            border-radius: 999px;
            border: 1px solid transparent;
            text-decoration: none;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 1;
        }

        .auth-topbar-link.ghost {
            color: var(--muted);
            border-color: color-mix(in srgb, var(--border) 58%, transparent);
            background: color-mix(in srgb, var(--surface) 76%, transparent);
        }

        .auth-topbar-link.ghost:hover {
            color: var(--accent);
            border-color: color-mix(in srgb, var(--accent) 36%, var(--border));
            background: color-mix(in srgb, var(--accent) 20%, var(--surface));
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
        }

        .auth-topbar-link.primary {
            color: var(--accent);
            border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
            background: color-mix(in srgb, var(--accent) 12%, var(--card));
        }

        .auth-topbar-link.primary:hover {
            background: color-mix(in srgb, var(--accent) 20%, var(--card));
        }

        @media (max-width: 620px) {
            .auth-topbar {
                width: calc(100% - 1rem);
                padding: 0.4rem 0.55rem;
            }

            .auth-topbar-brand span {
                display: none;
            }
        }

        .site-header {
            position: sticky;
            top: 0.45rem;
            z-index: 1200;
            border: none;
            background: transparent;
            box-shadow: none;
        }

        .site-header-inner {
            width: min(1200px, 100%);
            margin: 0 auto;
            min-height: 68px;
            padding: 0.48rem clamp(0.75rem, 1.4vw, 1.2rem);
            display: grid;
            grid-template-columns: minmax(180px, 1fr) auto minmax(220px, 1fr);
            align-items: center;
            gap: 0.9rem;
            flex-wrap: nowrap;
            border: 1px solid color-mix(in srgb, var(--border) 58%, transparent);
            border-radius: 16px;
            background: color-mix(in srgb, var(--card) 30%, transparent);
            backdrop-filter: blur(8px) saturate(1.05);
            -webkit-backdrop-filter: blur(8px) saturate(1.05);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.1);
        }

        .site-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            text-decoration: none;
            color: var(--ink);
            min-width: 0;
            justify-self: start;
        }

        .site-brand-logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            flex: 0 0 auto;
        }

        .site-brand-text {
            font-weight: 800;
            letter-spacing: 0.01em;
            font-family: var(--font-display);
            font-size: 1.02rem;
            white-space: nowrap;
            color: var(--ink);
        }

        .site-nav {
            display: inline-flex;
            align-items: center;
            gap: 0.42rem;
            flex-wrap: wrap;
            justify-self: center;
        }

        .site-nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: 999px;
            min-height: 38px;
            padding: 0 0.82rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 1;
        }

        .site-nav-link:hover,
        .site-nav-link.active {
            color: var(--accent);
            border-color: color-mix(in srgb, var(--accent) 36%, var(--border));
            background: color-mix(in srgb, var(--accent) 20%, var(--surface));
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
        }

        .site-header-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.52rem;
            margin-left: 0;
            flex-wrap: wrap;
            justify-self: end;
        }

        .site-header-actions form {
            margin: 0;
        }

        .header-account-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--border));
            background: color-mix(in srgb, var(--accent) 12%, var(--card));
            color: var(--accent);
            padding: 0 0.9rem;
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            text-decoration: none;
            line-height: 1;
        }

        .header-account-link:hover {
            background: color-mix(in srgb, var(--accent) 20%, var(--card));
        }

        .site-footer {
            position: relative;
            z-index: 1;
            padding: 0 1rem 1rem;
            margin: 0 auto;
        }

        .site-footer-inner {
            width: min(1200px, 100%);
            margin: 0 auto;
            border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
            border-radius: 14px;
            background: color-mix(in srgb, var(--card) 48%, transparent);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.12);
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .site-footer-copy {
            margin: 0;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .site-footer-nav {
            display: inline-flex;
            align-items: center;
            gap: 0.85rem;
            flex-wrap: wrap;
        }

        .site-footer-nav a {
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
        }

        .site-footer-nav a:hover {
            text-decoration: underline;
        }

        body.auth-layout .site-footer {
            padding-top: 1rem;
        }

        body.app-layout main {
            max-width: none;
            margin: 0;
            padding: 0;
        }

        body.app-layout .theme-fab {
            display: none;
        }

        body.app-layout .head-actions {
            display: none !important;
        }

        body.app-layout .crumb {
            display: none !important;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.14);
        }

        h1 {
            margin-top: 0;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            color: var(--accent);
        }

        p { line-height: 1.6; }
        .muted { color: var(--muted); }

        @media (prefers-reduced-motion: reduce) {
            .dash-content,
            .metric,
            .panel,
            tbody tr {
                animation: none !important;
                transition: none !important;
            }
        }

        @media (max-width: 840px) {
            .site-header-inner {
                gap: 0.55rem;
                min-height: 62px;
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "brand actions"
                    "nav nav";
            }

            .site-brand { grid-area: brand; }
            .site-nav {
                grid-area: nav;
                justify-content: flex-start;
                width: 100%;
            }

            .site-header-actions {
                grid-area: actions;
                justify-self: end;
            }

            .site-brand-logo {
                width: 40px;
                height: 40px;
            }

            .site-footer-inner {
                padding: 0.75rem 0.85rem;
            }
        }
        .auth-shell {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: grid;
            place-items: center;
            overflow: hidden;
            isolation: isolate;
            padding: clamp(1rem, 3vw, 2rem);
            perspective: 1100px;
        }

        .login-card {
            width: min(100%, 470px);
            border: 1px solid color-mix(in srgb, var(--border) 90%, transparent);
            border-radius: 16px;
            padding: clamp(1.4rem, 2.4vw, 2rem);
            box-shadow: 0 16px 40px rgba(20, 83, 45, 0.14);
            backdrop-filter: blur(3px);
            background: color-mix(in srgb, var(--card) 94%, transparent);
            animation: card-in 700ms cubic-bezier(.2, .8, .2, 1);
        }

        .eyebrow {
            margin: 0;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--muted);
        }

        .login-card h1 {
            margin: 0.35rem 0 0;
            font-size: clamp(1.55rem, 2.8vw, 2.2rem);
        }

        .subtext {
            margin-top: 0.55rem;
        }

        .notice {
            margin: 0.9rem 0 0;
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            font-size: 0.92rem;
            line-height: 1.4;
        }

        .notice.success {
            border: 1px solid #9fcead;
        }

        .notice.error {
            border: 1px solid #e1b0ad;
        }

        .switch-link {
            margin: 0.9rem 0 0;
            text-align: center;
            font-size: 0.95rem;
        }

        .switch-link a {
            font-weight: 700;
            text-decoration: none;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .login-form {
            margin-top: 1.2rem;
            display: grid;
            gap: 0.8rem;
        }

        .login-form label {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .login-form input {
            width: 100%;
            padding: 0.78rem 0.9rem;
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--border) 90%, transparent);
            font: inherit;
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        .login-form input:hover {
            border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 16%, transparent);
            transform: translateY(-1px);
        }

        .login-form button {
            margin-top: 0.5rem;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 10px;
            font: inherit;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
        }

        .login-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(20, 83, 45, 0.26);
            filter: brightness(1.03);
        }

        .login-form button:active {
            transform: translateY(0);
        }

        .login-form button:focus-visible {
            outline: 3px solid #9ad4b1;
            outline-offset: 2px;
        }

        .legal-consent {
            display: flex;
            gap: 0.55rem;
            align-items: flex-start;
            margin-top: 0.2rem;
            font-size: 0.87rem;
            line-height: 1.45;
        }

        .legal-consent input[type="checkbox"] {
            margin-top: 0.15rem;
            width: 1rem;
            height: 1rem;
            flex: 0 0 auto;
        }

        .legal-consent a {
            font-weight: 700;
            text-decoration: none;
        }

        .legal-consent a:hover {
            text-decoration: underline;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .form-alert {
            margin: 0 0 0.9rem;
            border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
            border-radius: 12px;
            padding: 0.72rem 0.85rem;
            font-size: 0.94rem;
            line-height: 1.45;
            background: color-mix(in srgb, var(--card) 92%, transparent);
            color: var(--ink);
            box-shadow: 0 10px 24px rgba(2, 6, 23, 0.08);
        }

        .form-alert.form-alert-error {
            border-color: color-mix(in srgb, var(--bad) 46%, var(--border));
            background: color-mix(in srgb, var(--bad) 10%, var(--card));
            color: color-mix(in srgb, var(--ink) 80%, var(--bad) 20%);
        }

        .field-error {
            margin: 0.38rem 0 0;
            font-size: 0.82rem;
            line-height: 1.4;
            color: var(--bad);
        }

        input.is-invalid,
        select.is-invalid,
        textarea.is-invalid {
            border-color: color-mix(in srgb, var(--bad) 60%, var(--border)) !important;
            background: color-mix(in srgb, var(--bad) 6%, var(--surface)) !important;
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--bad) 12%, transparent) !important;
        }

        input.is-invalid:focus,
        select.is-invalid:focus,
        textarea.is-invalid:focus {
            outline: none;
            border-color: var(--bad) !important;
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--bad) 16%, transparent) !important;
        }
        @media (max-width: 700px) {
            .form-alert {
                padding: 0.68rem 0.78rem;
                border-radius: 10px;
                font-size: 0.9rem;
            }

            .field-error {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 540px) {
            .login-card {
                border-radius: 14px;
            }

            .auth-topbar {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
            }

            .auth-topbar-links {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
    <script src="{{ url_for('static', filename='js/app_theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/equity_curve_shared.js') }}"></script>
    <script src="{{ url_for('static', filename='js/neon_ribbon.js') }}"></script>
    <script src="{{ url_for('static', filename='js/timezone_sync.js') }}"></script>
    <script src="{{ url_for('static', filename='js/form_validation.js') }}"></script>
    {% block page_scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='js/reveal_on_scroll.js') }}"></script>
</body>
</html>
